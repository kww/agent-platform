# ci-template.yml - 通用项目 CI 模板
# ============================================================================
# 用途: 复制到你的项目 .github/workflows/ci.yml 中使用
# 适用: 任何使用 agent-workflows 的项目
# ============================================================================

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ========================================
  # Job 1: 代码质量检查
  # ========================================
  quality:
    name: 代码质量
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint --if-present
      
      - name: Type check
        run: npx tsc --noEmit --if-present

  # ========================================
  # Job 2: 测试
  # ========================================
  test:
    name: 测试
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ========================================
  # Job 3: 项目验证（可选）
  # ========================================
  validate:
    name: 项目验证
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" \
            .agent-runtime/ 2>&1 || true
      
      - name: Check tasks.yml format
        run: |
          if [ -f "tasks.yml" ]; then
            python3 -c "
              import yaml
              with open('tasks.yml') as f:
                  data = yaml.safe_load(f)
              print('✅ tasks.yml 格式正确')
              print(f'项目: {data.get(\"project\", {}).get(\"name\", \"unknown\")}')
              print(f'任务数: {len(data.get(\"tasks\", []))}')
            "
          else
            echo "⏭️  没有 tasks.yml 文件"
          fi

  # ========================================
  # Job 4: 构建（可选）
  # ========================================
  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [quality, test]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build --if-present
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            dist/
            build/
            .next/
          retention-days: 7
