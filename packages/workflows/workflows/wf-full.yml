# wf-full.yml - 完整工作流
# ============================================================================
# 工作流类型: 完整流程
# 触发方式: /wf-full <需求> 或 /wf-full --feature_id FEAT-001
# Superpowers 整合: ✅ 完整 6 阶段 + Anthropic 模式 + Backlog 集成
#   - Phase 0: 入口判断（新增 backlog 模式支持）
#   - Phase 1-2: 规划阶段（brainstorming + writing-plans）
#   - Phase 2.5: 约束检查（Long-Running Agents）
#   - Phase 3-4: 开发阶段（subagent-driven + TDD + per-task review）
#   - Phase 5: E2E 测试阶段
#   - Phase 6: 发布阶段（verification + finishing + backlog resolve）
#
# Anthropic 模式扩展：
#   - feature_list.json: 功能清单（含 passes 字段）
#   - progress.json: 跨 session 进度追踪
#   - init.sh: 项目启动脚本
#   - 约束检查: Long-Running Agents 铁律
#   - E2E 测试: 端到端验证
#
# Backlog 集成（v4.0.0 AW-034）：
#   - 支持 --feature_id 从 backlog.yml 读取 Feature
#   - 完成后自动标记 Feature 为 resolved
#   - 复用 wf-dev 的 entry/backlog-load/backlog-resolve 步骤
# ============================================================================

id: wf-full
stage: develop
name: 完整开发流程
description: |
  从需求到发布的一站式完整流程，支持 Anthropic 模式 + Backlog 集成
  
  整合了规划 + 约束检查 + 开发 + E2E 测试 + 发布五个阶段
  
  **模式自动判断**：
  1. feature_id → backlog 模式（从 backlog.yml 读取）
  2. requirement → 规划模式（需求分析 → 架构设计 → 任务生成）
  
  前置条件：
  - 需要提供需求描述（规划模式）
  - 或提供 feature_id（backlog 模式）
  
  流程：
  1. 入口判断 → 确定执行模式
  2. 规划阶段（需求分析或加载 Feature）
  3. 约束检查（Long-Running Agents）
  4. 执行任务（含 per-task review）
  5. E2E 测试验证
  6. 发布上线 + 标记 Feature 解决

# 使用场景
usageScenario: |
  🎯 **适合场景**：
  - 新项目从零开始（规划模式）
  - 大型功能开发（规划模式）
  - 从 backlog 执行 Feature（backlog 模式）
  - 需要完整设计和测试的功能
  - 需要严格质量保证（约束检查 + E2E）
  
  ⚠️ **不适合**：
  - 单文件修改 → 用 wf-patch
  - Bug 修复 → 用 wf-bugfix
  - 小功能/原型 → 用 wf-quick
  - 已有 tasks.yml → 用 wf-dev（execute 模式）

# OpenClaw 元数据
openclaw:
  userInvocable: true
  emoji: "🚀"
  keywords: [完整开发, 全流程, 一站式, Anthropic, backlog, feature]
  examples:
    - input: "/wf-full '开发一个博客系统'"
      output: "规划 → 开发 → 测试 → 发布"
    - input: "/wf-full '开发一个博客系统' --enable_constraints --enable_e2e"
      output: "规划 → 约束检查 → 开发 → E2E 测试 → 发布"
    - input: "/wf-full ./project --feature_id FEAT-001"
      output: "加载 Feature → 开发 → 测试 → 发布 → 标记解决"
    - input: "/wf-full ./project --feature_id FEAT-001 --auto_resolve false"
      output: "加载 Feature → 开发 → 测试 → 发布（不自动标记解决）"

# Superpowers 整合
superpowers:
  - brainstorming
  - writing-plans
  - subagent-driven-development
  - tdd
  - verification-before-completion
  - finishing-a-development-branch

# 输入参数
inputs:
  - name: requirement
    type: string
    required: false
    description: 用户需求描述（规划模式）
  
  - name: feature_id
    type: string
    required: false
    description: Feature ID（backlog 模式，如 FEAT-001）
  
  - name: project_path
    type: path
    required: false
    description: 项目路径
    default: "."
  
  - name: project_name
    type: string
    description: 项目名称
    default: "new-project"
  
  - name: tech_stack
    type: object
    description: 技术栈配置
  
  - name: parallel
    type: boolean
    default: true
    description: 是否并行开发
  
  - name: enable_review
    type: boolean
    default: true
    description: 是否启用代码审查
  
  - name: output_format
    type: string
    required: false
    default: both
    enum: [tasks, feature_list, both]
    description: |
      输出格式：
      - tasks: 只生成 tasks.yml
      - feature_list: 只生成 feature_list.json
      - both: 生成两种格式
  
  - name: enable_constraints
    type: boolean
    required: false
    default: false
    description: |
      是否启用 Long-Running Agents 约束检查
      
      约束包括：
      - incremental_progress_required: 单功能推进
      - no_feature_without_decomposition: 功能拆解
      - no_feature_completion_without_e2e_test: E2E 验证
  
  - name: enable_e2e
    type: boolean
    required: false
    default: false
    description: 是否启用 E2E 测试（端到端浏览器测试）
  
  - name: test_url
    type: string
    required: false
    description: E2E 测试 URL（启用 E2E 时必填）
  
  - name: constraint_level
    type: string
    required: false
    default: guideline
    enum: [iron_law, guideline, tip]
    description: 约束级别
  
  - name: auto_resolve
    type: boolean
    required: false
    default: true
    description: 自动标记 Feature 解决（backlog 模式）

# 阶段定义
phases:
  - id: entry
    name: 入口判断
    parallel: false
  - id: planning
    name: 规划阶段
    parallel: false
  - id: constraint_check
    name: 约束检查
    parallel: false
  - id: development
    name: 开发阶段
    parallel: false
  - id: verification
    name: 验证阶段
    parallel: false
  - id: e2e_test
    name: E2E 测试
    parallel: false
  - id: release
    name: 发布阶段
    parallel: false

# ==========================================================================
# 工作流步骤
# ==========================================================================
steps:
  # ==========================================================================
  # Phase 0: 入口判断（新增）
  # ==========================================================================
  - id: phase-0-entry
    phase: 入口判断
  
  - id: determine-mode
    name: 判断执行模式
    step: wf-dev/entry
    input:
      project_path: "${inputs.project_path}"
      feature_id: "${inputs.feature_id}"
      requirement: "${inputs.requirement}"
      mode: auto
    output:
      determined_mode
      has_feature_id
  
  # ==========================================================================
  # Phase 1: 规划阶段
  # ==========================================================================
  - id: phase-1-planning
    phase: 规划阶段
  
  # 1.0 Backlog 模式：加载 Feature
  - id: load-feature
    name: 加载 Feature
    condition: "${steps.determine-mode.has_feature_id} == true"
    step: wf-dev/backlog-load
    input:
      project_path: "${inputs.project_path}"
      feature_id: "${inputs.feature_id}"
    output:
      feature
      feature_title
      feature_description
      feature_priority
    checkpoint:
      message: "📋 Feature: ${feature_title}"
  
  # 1.1 需求分析（规划模式）
  - id: analyze-requirements
    name: 需求分析
    condition: "${steps.determine-mode.has_feature_id} == false"
    step: analysis/analyze-requirements
    input:
      requirement: "${inputs.requirement}"
    output:
      - requirements.md
      - features
      - constraints
    checkpoint:
      verify: requirements.md exists
      message: "📋 需求文档已生成"
  
  # 1.2 架构设计（规划模式）
  - id: design-architecture
    name: 架构设计
    condition: "${steps.determine-mode.has_feature_id} == false"
    step: design/design-architecture
    input:
      requirements: "${steps.analyze-requirements.output}"
    output:
      - architecture.md
      - modules
      - tech_stack_resolved
    checkpoint:
      verify: architecture.md exists
      message: "🏗️ 架构文档已生成"
  
  # 1.3 API 设计（规划模式）
  - id: design-api
    name: API 设计
    condition: "${steps.determine-mode.has_feature_id} == false"
    step: design/design-api
    input:
      architecture: "${steps.design-architecture.output}"
    output:
      - openapi.yaml
      - endpoints
    checkpoint:
      verify: openapi.yaml exists
      message: "📄 API 契约已生成"
  
  # 1.4 生成任务清单（传统格式，规划模式）
  - id: generate-tasks
    name: 生成任务清单
    condition: "${steps.determine-mode.has_feature_id} == false and ${inputs.output_format} in ['tasks', 'both']"
    execute:
      type: builtin
      handler: generate-tasks
    input:
      project_path: "${inputs.project_path}"
      project_name: "${inputs.project_name}"
      tech_stack: "${inputs.tech_stack}"
    output:
      - tasks.yml
      - task_count
    checkpoint:
      verify: tasks.yml exists
      message: "📋 生成了 ${task_count} 个任务"
  
  # 1.5 生成功能清单（Anthropic 格式，规划模式）
  - id: generate-feature-list
    name: 生成功能清单
    condition: "${steps.determine-mode.has_feature_id} == false and ${inputs.output_format} in ['feature_list', 'both']"
    execute:
      type: script
      script: |
        #!/bin/bash
        # Anthropic 模式：生成 feature_list.json
        
        PROJECT_PATH="${inputs.project_path}"
        ARCHITECTURE="${steps.design-architecture.output}"
        REQUIREMENTS="${steps.analyze-requirements.output}"
        
        echo "生成 feature_list.json..."
    output: feature_list.json
  
  # 1.6 生成进度追踪文件（规划模式）
  - id: generate-progress
    name: 生成进度追踪文件
    condition: "${steps.determine-mode.has_feature_id} == false and ${inputs.output_format} in ['feature_list', 'both']"
    execute:
      type: script
      script: |
        #!/bin/bash
        # Anthropic 模式：生成 progress.json
        
        PROJECT_PATH="${inputs.project_path}"
        PROJECT_NAME="${inputs.project_name}"
        CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        # 初始化 progress.json
        cat > "$PROJECT_PATH/progress.json" << EOF
        {
          "project_name": "$PROJECT_NAME",
          "started_at": "$CURRENT_TIME",
          "current_phase": "planning",
          "features": {},
          "sessions": []
        }
        EOF
        
        echo "✅ progress.json 已生成"
    output: progress.json
  
  # 1.7 生成项目启动脚本（规划模式）
  - id: generate-init-script
    name: 生成项目启动脚本
    condition: "${steps.determine-mode.has_feature_id} == false and ${inputs.output_format} in ['feature_list', 'both']"
    execute:
      type: script
      script: |
        #!/bin/bash
        # Anthropic 模式：生成 init.sh
        
        PROJECT_PATH="${inputs.project_path}"
        
        cat > "$PROJECT_PATH/init.sh" << 'EOF'
        #!/bin/bash
        # 项目启动脚本
        
        echo "🚀 初始化项目..."
        npm install
        npm run dev
        EOF
        
        chmod +x "$PROJECT_PATH/init.sh"
        echo "✅ init.sh 已生成"
    output: init.sh
  
  # 1.8 校验任务清单（规划模式）
  - id: validate-tasks
    name: 校验任务清单
    condition: "${steps.determine-mode.has_feature_id} == false and ${inputs.output_format} in ['tasks', 'both']"
    execute:
      type: builtin
      handler: validate-tasks
    input:
      tasks_path: "${inputs.project_path}/tasks.yml"
      strict: true
    output:
      - valid
      - errors
      - warnings
    checkpoint:
      verify: valid == true
      message: "✅ tasks.yml 校验通过"

  # ==========================================================================
  # Phase 2: 约束检查（Long-Running Agents）
  # ==========================================================================
  - id: phase-2-constraint-check
    phase: 约束检查
  
  # 2.1 调用独立约束检查工作流
  - id: constraint-check
    condition: "${inputs.enable_constraints} == true"
    step: wf-constraint
    input:
      project_path: "${inputs.project_path}"
      constraint_level: "${inputs.constraint_level}"
      quick: true
      output_format: summary
    on_fail: continue
    output: constraint_result
  
  # 2.2 约束检查失败处理
  - id: constraint-check-failed
    condition: "${inputs.enable_constraints} == true and ${steps.constraint-check.passed} == false"
    execute:
      type: script
      script: |
        #!/bin/bash
        CONSTRAINT_LEVEL="${inputs.constraint_level}"
        
        if [ "$CONSTRAINT_LEVEL" = "iron_law" ]; then
          echo "❌ 违反铁律约束，工作流终止"
          echo "违规项: ${steps.constraint-check.violations}"
          exit 1
        else
          echo "⚠️ 违反指导原则，继续执行"
          echo "违规项: ${steps.constraint-check.violations}"
        fi
    output: constraint_decision

  # ==========================================================================
  # Phase 3: 开发阶段
  # ==========================================================================
  - id: phase-3-development
    phase: 开发阶段
  
  # 3.1 加载任务清单
  - id: load-tasks
    name: 加载任务清单
    execute:
      type: builtin
      handler: load-tasks
    input:
      path: "${inputs.project_path}/tasks.yml"
    output:
      - project
      - infrastructure
      - tasks
      - execution_plan
    checkpoint:
      verify: tasks loaded successfully
      message: "📋 任务清单已加载"
  
  # 3.2 动态执行任务（含 per-task review）
  - id: execute-tasks
    name: 执行开发任务
    execute:
      type: dynamic
      source: "${steps.load-tasks.tasks}"
      step_template:
        step: development/develop-task
        input:
          task: "{{task}}"
          project: "${steps.load-tasks.project}"
          previous_outputs: "${session_history}"
      parallel: "${inputs.parallel}"
      max_parallel: 3
      continue_on_error: false
    checkpoint:
      verify: all tasks completed
      message: "✅ 所有任务开发完成"

  # ==========================================================================
  # Phase 4: 验证阶段（测试和审查并行）
  # ==========================================================================
  - id: phase-4-verification
    phase: 验证阶段
  
  # 4.1 并行执行：测试 + 审查
  - id: run-tests
    name: 运行测试
    parallel: true
    step: quality/run-tests
    input:
      project_path: "${inputs.project_path}"
    output: test_result
    checkpoint:
      verify: all tests pass
      message: "🧪 测试通过"
  
  - id: review-code
    name: 代码审查
    parallel: true
    condition: "${inputs.enable_review} == true"
    step: quality/review-code
    input:
      project_path: "${inputs.project_path}"
    output: review_result
    checkpoint:
      verify: review passed
      message: "✅ 代码审查通过"

  # ==========================================================================
  # Phase 5: E2E 测试
  # ==========================================================================
  - id: phase-5-e2e-test
    phase: E2E 测试
  
  # 5.1 检查是否需要 E2E 测试
  - id: check-e2e-required
    condition: "${inputs.enable_e2e} == true"
    execute:
      type: script
      script: |
        #!/bin/bash
        
        if [ -z "${inputs.test_url}" ]; then
          echo "e2e_required=false"
          echo "⚠️ 未提供 test_url，跳过 E2E 测试"
        else
          echo "test_url=${inputs.test_url}"
          echo "e2e_required=true"
        fi
    output: e2e_info
  
  # 5.2 E2E 测试：启动浏览器
  - id: start-browser
    condition: "${steps.check-e2e-required.e2e_required} == true"
    tool: browser/browser-start
    input:
      url: "${inputs.test_url}"
      headless: false
    output: browser_session
  
  # 5.3 E2E 测试：执行功能测试
  - id: execute-e2e-tests
    condition: "${steps.check-e2e-required.e2e_required} == true and ${steps.check-feature-list.has_feature_list} == true"
    execute:
      type: dynamic
      source: "${steps.load-tasks.project.features}"
      step_template:
        tool: browser/browser-automate
        input:
          browser_session: "${steps.start-browser.session_id}"
          steps: "{{feature.passes}}"
          feature_id: "{{feature.id}}"
          capture_screenshots: true
      parallel: false
    output: e2e_results
  
  # 5.4 E2E 测试：验证
  - id: verify-e2e-screenshots
    condition: "${steps.check-e2e-required.e2e_required} == true"
    execute:
      type: script
      script: |
        #!/bin/bash
        E2E_RESULTS="${steps.execute-e2e-tests.output}"
        
        # 检查每个功能的 E2E 测试是否通过
        FAILED_FEATURES=$(echo "$E2E_RESULTS" | jq '[.[] | select(.passed == false) | .feature_id]')
        
        if [ "$(echo "$FAILED_FEATURES" | jq 'length')" -gt 0 ]; then
          echo "ERROR: E2E 测试失败的功能：$FAILED_FEATURES"
          if [ "${inputs.enable_constraints}" == "true" ]; then
            exit 1
          fi
        else
          echo "✅ E2E 测试全部通过"
        fi
    output: e2e_verification
  
  # 5.5 E2E 测试：关闭浏览器
  - id: close-browser
    condition: "${steps.check-e2e-required.e2e_required} == true"
    tool: browser/browser-close
    input:
      session_id: "${steps.start-browser.session_id}"

  # ==========================================================================
  # Phase 6: 发布阶段
  # ==========================================================================
  - id: phase-6-release
    phase: 发布阶段
  
  # 6.1 更新 progress.json
  - id: update-progress
    condition: "${steps.generate-progress.executed} == true"
    execute:
      type: script
      script: |
        #!/bin/bash
        PROJECT_PATH="${inputs.project_path}"
        CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        jq --arg time "$CURRENT_TIME" \
           --arg phase "completed" \
           '.last_updated = $time | .current_phase = $phase' \
           "$PROJECT_PATH/progress.json" > "$PROJECT_PATH/progress.json.tmp"
        
        mv "$PROJECT_PATH/progress.json.tmp" "$PROJECT_PATH/progress.json"
        echo "✅ progress.json 已更新"
  
  # 6.2 生成完成报告
  - id: generate-report
    name: 生成报告
    execute:
      type: builtin
      handler: generate-completion-report
    input:
      project_path: "${inputs.project_path}"
      project: "${steps.load-tasks.project}"
      test_result: "${steps.run-tests.output}"
      review_result: "${steps.review-code.output}"
      e2e_result: "${steps.execute-e2e-tests.output}"
      constraints_enabled: "${inputs.enable_constraints}"
    output: completion_report
  
  # 6.3 提交发布
  - id: commit-push
    name: 提交发布
    step: deploy/commit-push
    input:
      project_path: "${inputs.project_path}"
      message: "feat: ${inputs.requirement || steps.load-feature.feature_title}"
    output: commit_result
    checkpoint:
      verify: code pushed
      message: "🚀 代码已发布"
  
  # 6.4 Backlog 模式：标记 Feature 解决（新增）
  - id: resolve-feature
    name: 标记 Feature 解决
    condition: "${steps.determine-mode.has_feature_id} == true"
    step: wf-dev/backlog-resolve
    input:
      project_path: "${inputs.project_path}"
      feature_id: "${inputs.feature_id}"
      auto_resolve: "${inputs.auto_resolve}"
      commit_hash: "${steps.commit-push.commit_hash}"
      execution_mode: "wf-full"
    output:
      resolved
      item
    checkpoint:
      message: "📋 已标记解决: ${inputs.feature_id}"
  
  # 6.5 完成通知
  - id: notify-complete
    tool: notification/notify
    input:
      channel: discord
      message: |
        🎉 完整开发流程完成
        
        项目: ${inputs.project_name}
        模式: ${steps.determine-mode.determined_mode}
        
        📊 阶段完成：
        - 规划: ✅
        - 约束检查: ${inputs.enable_constraints == true ? '✅' : '⏭️'}
        - 开发: ✅
        - 测试: ✅
        - E2E: ${inputs.enable_e2e == true ? '✅' : '⏭️'}
        - 发布: ✅
        - Backlog: ${steps.determine-mode.has_feature_id == true ? '✅ 已标记解决' : '⏭️'}
        
        📝 任务数: ${steps.load-tasks.tasks.length}

# 动态执行配置
dynamic_execution:
  enabled: true
  source: "${steps.load-tasks.tasks}"
  step_template:
    step: development/develop-task
    input:
      task: "{{task}}"
      project: "${steps.load-tasks.project}"
      previous_outputs: "${session_history}"

# 输出
outputs:
  - name: mode
    type: string
    description: 执行模式（planning/backlog）
  
  - name: feature_id
    type: string
    description: Feature ID（backlog 模式）
  
  - name: feature_resolved
    type: boolean
    description: 是否已标记解决（backlog 模式）
  
  - name: requirements.md
    type: file
    path: "${inputs.project_path}/requirements.md"
    condition: "${steps.determine-mode.has_feature_id} == false"
  
  - name: architecture.md
    type: file
    path: "${inputs.project_path}/architecture.md"
    condition: "${steps.determine-mode.has_feature_id} == false"
  
  - name: openapi.yaml
    type: file
    path: "${inputs.project_path}/openapi.yaml"
    condition: "${steps.determine-mode.has_feature_id} == false"
  
  - name: tasks.yml
    type: file
    path: "${inputs.project_path}/tasks.yml"
    condition: "${inputs.output_format} in ['tasks', 'both']"
  
  - name: feature_list.json
    type: file
    path: "${inputs.project_path}/feature_list.json"
    condition: "${inputs.output_format} in ['feature_list', 'both']"
  
  - name: progress.json
    type: file
    path: "${inputs.project_path}/progress.json"
    condition: "${inputs.output_format} in ['feature_list', 'both']"
  
  - name: init.sh
    type: file
    path: "${inputs.project_path}/init.sh"
    condition: "${inputs.output_format} in ['feature_list', 'both']"
  
  - name: completion_report
    type: file
    path: "${inputs.project_path}/COMPLETION_REPORT.md"
  
  - name: test_result
    type: object
  
  - name: e2e_result
    type: object
    condition: "${inputs.enable_e2e} == true"
  
  - name: commit_result
    type: object

# 铁律检查
iron_laws:
  # === 传统铁律 ===
  - id: no_code_without_test
    message: "开发时必须先写测试（TDD）"
    enforce_at: execute-tasks
  
  - id: no_completion_without_verification
    message: "发布前必须验证测试通过"
    enforce_at: run-tests
  
  - id: review_before_commit
    message: "每个任务完成后必须通过 review 才能提交"
    enforce_at: execute-tasks
  
  # === Long-Running Agents 约束（可选启用）===
  - id: no_feature_without_decomposition
    message: "实现功能前必须先拆解为可验证的子任务"
    condition: "${inputs.enable_constraints} == true"
    enforce_at: check-feature-decomposition
    level: "${inputs.constraint_level}"
    exceptions:
      - trivial_change
      - bug_fix_only
      - internal_refactor
  
  - id: no_feature_completion_without_e2e_test
    message: "功能完成必须有端到端测试验证"
    condition: "${inputs.enable_constraints} == true and ${inputs.enable_e2e} == true"
    enforce_at: verify-e2e-screenshots
    level: "${inputs.constraint_level}"
    exceptions:
      - backend_only
      - internal_refactor
      - library_code

# 错误处理
error_handling:
  - error: PLANNING_FAILED
    action: abort
    message: "规划阶段失败，请检查需求描述"
  
  - error: CONSTRAINT_VIOLATION
    action: "${inputs.constraint_level == 'iron_law' ? 'abort' : 'warn'}"
    message: "约束违规：${error.constraint_id}"
  
  - error: TASK_FAILED
    action: pause
    message: "任务失败，等待人工干预"
  
  - error: TEST_FAILED
    action: retry
    max_retries: 3
    message: "测试失败，自动重试"
  
  - error: E2E_TEST_FAILED
    action: "${inputs.enable_constraints == true ? 'abort' : 'continue'}"
    message: "E2E 测试失败"

# 回滚配置
rollback:
  enabled: true
  on_phases: [release]
  steps:
    - command: "git reset --hard HEAD~1"
      message: "发布失败，回滚到上一个提交"

