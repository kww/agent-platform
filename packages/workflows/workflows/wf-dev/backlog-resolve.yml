# wf-dev/backlog-resolve.yml - Backlog 模式：标记解决
# ============================================================================
# 用途：在 backlog 中标记 feature 为已解决
# 输入：feature_id, 完成信息
# 输出：解决状态
# ============================================================================

id: wf-dev/backlog-resolve
name: 标记 Feature 解决
description: |
  调用 backlog/resolve 标记 feature 为已解决
  
  仅在 auto_resolve=true 时执行

category: wf-dev

# 输入
inputs:
  project_path:
    type: string
    description: 项目路径
    required: true
  
  feature_id:
    type: string
    description: Feature ID
    required: true
  
  auto_resolve:
    type: boolean
    description: 是否自动标记解决
    required: false
    default: true
  
  commit_hash:
    type: string
    description: 提交 hash（可选）
    required: false
  
  execution_mode:
    type: string
    description: 执行模式
    required: false
    default: "backlog"

# 输出
outputs:
  - name: resolved
    type: boolean
    description: 是否已标记解决
  
  - name: item
    type: object
    description: 解决后的 feature 对象

# 条件
condition: "${inputs.auto_resolve} == true and ${inputs.feature_id} != ''"

# 步骤流程
steps:
  - id: resolve-in-backlog
    step: backlog/resolve
    input:
      project_path: "${inputs.project_path}"
      item_id: "${inputs.feature_id}"
      resolution: |
        Completed by wf-dev (${inputs.execution_mode} mode)
        Commit: ${inputs.commit_hash:-N/A}
        Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
    output:
      item
  
  - id: confirm-resolution
    execute:
      type: script
      script: |
        #!/bin/bash
        FEATURE_ID="${inputs.feature_id}"
        echo "✅ Feature 已标记解决: $FEATURE_ID"
        echo "resolved=true"

# 元数据
metadata:
  author: Agent Studio
  version: 1.0.0
  tags: [wf-dev, backlog, resolve]