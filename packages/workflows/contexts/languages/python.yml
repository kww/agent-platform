# Python 项目上下文

language: python
fileExtensions:
  - .py
  - .pyi

entryPoints:
  - main.py
  - app.py
  - manage.py
  - run.py
  - __main__.py
  - wsgi.py
  - asgi.py

commonPatterns:
  - "Type hints"
  - "Decorators"
  - "Context managers"
  - "Dataclasses"

excludeDirs:
  - __pycache__
  - .venv
  - venv
  - .env
  - node_modules
  - build
  - dist
  - .eggs
  - "*.egg-info"

testPatterns:
  - "**/*_test.py"
  - "**/test_*.py"
  - "**/tests/**"

lintConfig:
  - pyproject.toml
  - setup.cfg
  - .flake8

formatConfig:
  - pyproject.toml
  - .black

defaultPipelines:
  frontend: null
  backend: backend-python
  test: pytest

bestPractices:
  - "使用 type hints"
  - "使用 dataclasses 或 Pydantic"
  - "使用 virtual environment"
  - "使用 uv 或 poetry 管理依赖"

commonDependencies:
  - python
  - pip
  - uv
  - poetry
